name: Release TPA Datapack

on:
  push:
    tags:
      - '*'   # 任何 tag 推送都会触发

jobs:
  release:
    name: Build & Release Datapack
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Set up zip (Ubuntu 默认已安装，但加上保证)
    - name: Install zip (if needed)
      run: |
        sudo apt-get update
        sudo apt-get install -y zip

    # 3️⃣ Build all variants
    - name: Package all variants
      run: |
        mkdir -p build

        for dir in src/*; do
          name=$(basename "$dir")
          echo "Packaging '$name'"

          if [ ! -f "$dir/pack.mcmeta" ]; then
            echo "Skipping '$name' (no pack.mcmeta)"
            continue
          fi

          # 进入 variant 目录，打 zip，zip 内容是当前目录下的 data/ 和 pack.mcmeta
          (
            cd "$dir"
            zip -r "../../build/TPA_datapack-2.0.6-${name}.zip" *
          )
        done

        echo "Generated files in build:"
        ls -lh build/

    - name: Prepare release notes
      id: changelog
      run: |
        NOTES=$(cat CHANGELOG.md)
        echo "notes<<EOF" >> $GITHUB_ENV
        echo "$NOTES" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 5️⃣ Create GitHub Release with assets
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: TPA Datapack ${{ github.ref_name }}
        body: ${{ env.notes }}
        files: build/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}